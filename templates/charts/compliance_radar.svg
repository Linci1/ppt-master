<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    合规达标雷达图
    用途: 多维度合规状态评估，当前水平 vs 目标基线对比
    适用场景: 等保评估、合规差距分析、ISO 27001 审计、安全成熟度评估
    特点: 雷达图 + 目标基线 + 差距高亮
    -->

    <defs>
        <filter id="radarShadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="1"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <linearGradient id="currentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7BBD4A" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#4CAF50" stop-opacity="0.2"/>
        </linearGradient>

        <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#BDBDBD" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#9E9E9E" stop-opacity="0.15"/>
        </linearGradient>

        <!-- 8边形坐标点 (半径220, 中心640, 385) -->
        <!-- 角度: 上=0°, 顺时针: 45°, 90°, 135°, 180°, 225°, 270°, 315° -->
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- 标题 -->
    <text x="60" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="bold" fill="#1A1C1E">合规达标雷达图</text>
    <text x="60" y="80" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" fill="#7F8C8D">等保三级 8维度评估 · 虚线=目标基线 · 绿色实心=当前水平 · 红色=未达标项</text>

    <!-- ========== 雷达图区域 ========== -->
    <g id="radarChart" transform="translate(560, 380)">
        <!-- 8边形坐标计算 (半径R=230, 8个方向从正上顺时针) -->
        <!-- 方向角: 0°(上), 45°, 90°(右), 135°, 180°(下), 225°, 270°(左), 315° -->
        <!-- x=R*sin(θ), y=-R*cos(θ) -->

        <!-- 背景网格 - 5层同心八边形 -->
        <!-- 100%层 R=230 -->
        <polygon points="0,-230 162.6,-162.6 230,0 162.6,162.6 0,230 -162.6,162.6 -230,0 -162.6,-162.6"
                 fill="none" stroke="#E8E8E8" stroke-width="1"/>
        <!-- 80%层 R=184 -->
        <polygon points="0,-184 130.1,-130.1 184,0 130.1,130.1 0,184 -130.1,130.1 -184,0 -130.1,-130.1"
                 fill="none" stroke="#E8E8E8" stroke-width="1"/>
        <!-- 60%层 R=138 -->
        <polygon points="0,-138 97.6,-97.6 138,0 97.6,97.6 0,138 -97.6,97.6 -138,0 -97.6,-97.6"
                 fill="none" stroke="#E8E8E8" stroke-width="1"/>
        <!-- 40%层 R=92 -->
        <polygon points="0,-92 65.1,-65.1 92,0 65.1,65.1 0,92 -65.1,65.1 -92,0 -65.1,-65.1"
                 fill="none" stroke="#E8E8E8" stroke-width="1"/>
        <!-- 20%层 R=46 -->
        <polygon points="0,-46 32.5,-32.5 46,0 32.5,32.5 0,46 -32.5,32.5 -46,0 -32.5,-32.5"
                 fill="none" stroke="#E8E8E8" stroke-width="1"/>

        <!-- 轴线 -->
        <line x1="0" y1="0" x2="0" y2="-230" stroke="#D0D0D0" stroke-width="0.8"/>
        <line x1="0" y1="0" x2="162.6" y2="-162.6" stroke="#D0D0D0" stroke-width="0.8"/>
        <line x1="0" y1="0" x2="230" y2="0" stroke="#D0D0D0" stroke-width="0.8"/>
        <line x1="0" y1="0" x2="162.6" y2="162.6" stroke="#D0D0D0" stroke-width="0.8"/>
        <line x1="0" y1="0" x2="0" y2="230" stroke="#D0D0D0" stroke-width="0.8"/>
        <line x1="0" y1="0" x2="-162.6" y2="162.6" stroke="#D0D0D0" stroke-width="0.8"/>
        <line x1="0" y1="0" x2="-230" y2="0" stroke="#D0D0D0" stroke-width="0.8"/>
        <line x1="0" y1="0" x2="-162.6" y2="-162.6" stroke="#D0D0D0" stroke-width="0.8"/>

        <!-- ========== 目标基线 (虚线) - 100%全部 ========== -->
        <polygon points="0,-230 162.6,-162.6 230,0 162.6,162.6 0,230 -162.6,162.6 -230,0 -162.6,-162.6"
                 fill="none" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/>

        <!-- ========== 当前水平 (品牌绿色) ========== -->
        <!-- 数值: 访问控制85%, 数据加密90%, 审计日志65%, 身份认证80%, 网络安全70%, 应用安全88%, 物理安全95%, 人员管理75% -->
        <!-- 各点坐标 = 百分比 * 方向向量 -->
        <!-- 0°上: (0, -195.5)   45°右上一: (138.2, -138.2)  90°右: (195.5, 0) -->
        <!-- 135°右下: (96.9, 96.9)   180°下: (0, 138)  225°左下: (-114.3, 114.3) -->
        <!-- 270°左: (-115, 0)   315°左上: (-107.3, -107.3) -->
        <!-- 审计日志65%=230*0.65=149.5*sin90=149.5 → (149.5, 0) 实际第3轴90° -->
        <!-- 网络安全70% → 第5轴180° → (0, 161) -->
        <!-- 物理安全95% → 第6轴225° → (-154.5, 154.5) -->
        <!-- 访问控制85% → (0, -195.5) -->
        <!-- 数据加密90% → 第2轴45° → (146.3, -146.3) -->
        <!-- 审计日志65% → 第3轴90° → (149.5, 0) -->
        <!-- 身份认证80% → 第4轴135° → (130.1, 130.1) -->
        <!-- 网络安全70% → 第5轴180° → (0, 161) -->
        <!-- 应用安全88% → 第6轴225° → (-143.2, 143.2) -->
        <!-- 物理安全95% → 第7轴270° → (-218.5, 0) -->
        <!-- 人员管理75% → 第8轴315° → (-115, -115) -->

        <polygon points="0,-195.5 146.3,-146.3 149.5,0 130.1,130.1 0,161 -143.2,143.2 -218.5,0 -115,-115"
                 fill="url(#currentGrad)" stroke="#7BBD4A" stroke-width="3" filter="url(#radarShadow)"/>

        <!-- 当前数据点 -->
        <circle cx="0" cy="-195.5" r="6" fill="#7BBD4A" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="146.3" cy="-146.3" r="6" fill="#7BBD4A" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="149.5" cy="0" r="6" fill="#ED7D31" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="130.1" cy="130.1" r="6" fill="#7BBD4A" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="0" cy="161" r="6" fill="#ED7D31" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="-143.2" cy="143.2" r="6" fill="#7BBD4A" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="-218.5" cy="0" r="7" fill="#4CAF50" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="-115" cy="-115" r="6" fill="#ED7D31" stroke="#FFFFFF" stroke-width="2"/>

        <!-- 差距高亮标记 (当前 < 80%的维度) -->
        <!-- 审计日志65% → 差距=80%-65%=15% → 目标点(184,0), 差34.5px -->
        <line x1="149.5" y1="0" x2="184" y2="0" stroke="#FF0000" stroke-width="2.5" stroke-dasharray="4,3"/>
        <circle cx="166.8" cy="0" r="4" fill="#FF0000"/>

        <!-- 网络安全70% → 目标点(0, 184), 差距23px -->
        <line x1="0" y1="161" x2="0" y2="184" stroke="#FF0000" stroke-width="2.5" stroke-dasharray="4,3"/>
        <circle cx="0" cy="172.5" r="4" fill="#FF0000"/>

        <!-- 人员管理75% → 目标点(-120, -120), 差距5,5 -->
        <line x1="-115" y1="-115" x2="-120" y2="-120" stroke="#FF0000" stroke-width="2.5" stroke-dasharray="4,3"/>
        <circle cx="-117.5" cy="-117.5" r="3" fill="#FF0000"/>
    </g>

    <!-- ========== 维度标签 ========== -->
    <text x="560" y="110" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#2C3E50" text-anchor="middle">访问控制</text>

    <text x="760" y="150" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#2C3E50" text-anchor="start">数据加密</text>

    <text x="810" y="385" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#C00000" text-anchor="start">⚠ 审计日志</text>

    <text x="760" y="620" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#2C3E50" text-anchor="start">身份认证</text>

    <text x="560" y="655" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#C00000" text-anchor="middle">⚠ 网络安全</text>

    <text x="340" y="620" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#2C3E50" text-anchor="end">应用安全</text>

    <text x="230" y="385" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#4CAF50" text-anchor="end">✓ 物理安全</text>

    <text x="340" y="150" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#C00000" text-anchor="end">⚠ 人员管理</text>

    <!-- ========== 未达标项榜单（右侧） ========== -->
    <g id="gapList" transform="translate(940, 120)">
        <rect x="0" y="0" width="280" height="200" rx="8" fill="#FFF5F5" stroke="#FFCDD2" stroke-width="1"/>
        <text x="140" y="28" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="bold" fill="#C00000" text-anchor="middle">🔴 未达标项 (3项)</text>

        <line x1="15" y1="42" x2="265" y2="42" stroke="#FFCDD2" stroke-width="1"/>

        <!-- 项目1 -->
        <rect x="12" y="52" width="4" height="36" rx="2" fill="#FF0000"/>
        <text x="24" y="68" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="bold" fill="#404040">审计日志</text>
        <text x="24" y="84" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#7F8C8D">当前 65% → 目标 100% (差35%)</text>

        <!-- 项目2 -->
        <rect x="12" y="100" width="4" height="36" rx="2" fill="#ED7D31"/>
        <text x="24" y="116" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="bold" fill="#404040">网络安全</text>
        <text x="24" y="132" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#7F8C8D">当前 70% → 目标 100% (差30%)</text>

        <!-- 项目3 -->
        <rect x="12" y="148" width="4" height="36" rx="2" fill="#ED7D31"/>
        <text x="24" y="164" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="bold" fill="#404040">人员管理</text>
        <text x="24" y="180" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#7F8C8D">当前 75% → 目标 100% (差25%)</text>
    </g>

    <!-- ========== 图例 ========== -->
    <g id="legend" transform="translate(60, 540)">
        <rect x="0" y="0" width="220" height="115" rx="8" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1"/>
        <text x="110" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#2C3E50" text-anchor="middle">图例</text>

        <rect x="20" y="42" width="24" height="12" rx="2" fill="#7BBD4A" opacity="0.6"/>
        <text x="55" y="52" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#404040">当前合规水平</text>

        <line x1="20" y1="70" x2="44" y2="70" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="6,4"/>
        <text x="55" y="74" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#404040">等保三级目标基线</text>

        <line x1="20" y1="94" x2="44" y2="94" stroke="#FF0000" stroke-width="2.5" stroke-dasharray="3,2"/>
        <text x="55" y="98" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#404040">差距 (Gap)</text>
    </g>

    <!-- 整体达标率 -->
    <g id="overallScore" transform="translate(60, 430)">
        <rect x="0" y="0" width="200" height="85" rx="10" fill="#F5F7FA" stroke="#E0E0E0" stroke-width="1"/>
        <text x="100" y="30" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#7F8C8D" text-anchor="middle">整体合规率</text>
        <text x="100" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="bold" fill="#7BBD4A" text-anchor="middle">81%</text>
    </g>

    <!-- 数据来源 -->
    <text x="60" y="695" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#95A5A6">数据来源：等保三级差距评估报告 / 安全基线检查结果</text>
</svg>