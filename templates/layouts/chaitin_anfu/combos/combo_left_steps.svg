<svg xmlns="http://www.w3.org/2000/svg" viewBox="30.933 93.400 332.067 572.067">
  <rect x="33.93" y="96.40" width="326.07" height="566.07" rx="15.75" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="0.840"/>
  <rect x="52.27" y="78.20" width="112.80" height="35.40" rx="2.62" fill="#FFFFFF"/>
  <text x="108.667" y="95.9" fill="#75BA66" font-size="8" font-weight="bold" font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">需求背景</text>
  <text x="35.133" y="126.747" font-family="Microsoft YaHei"><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">客户首次探索大模型应用场景</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">，</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="bold">对于现有大模型应用场景的安全风险了解不足</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">，</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">且</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="bold">内部安全部门当前尚不具备针对大模型应用的安全测试能力</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">。</tspan></text>
  <rect x="53.47" y="277.67" width="287.60" height="95.00" fill="#A7D18E"/>
  <text x="197.267" y="325.167" fill="#1A1A1A" font-size="6.5"  font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">针对大模型应用的全量关键组件进行全面的安全测试</text>
  <circle cx="83.53" cy="273.33" r="31.27" fill="#7BBD4A"/>
  <text x="83.533" y="273.333" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">01</text>
  <rect x="53.47" y="409.67" width="287.60" height="94.93" fill="#A7D18E"/>
  <text x="197.267" y="457.133" fill="#1A1A1A" font-size="6.5"  font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">通过安全测试，识别并报告大模型应用场景中存在的核心问题</text>
  <circle cx="84.73" cy="403.93" r="31.27" fill="#7BBD4A"/>
  <text x="84.733" y="403.933" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">02</text>
  <rect x="53.47" y="541.60" width="287.60" height="94.93" fill="#A7D18E"/>
  <text x="197.267" y="589.067" fill="#1A1A1A" font-size="6.5"  font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">针对发现的安全问题，提供专业的修复建议和加固手段</text>
  <circle cx="84.73" cy="538.67" r="31.27" fill="#7BBD4A"/>
  <text x="84.733" y="538.667" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">03</text>
  <rect x="402.47" y="458.20" width="112.80" height="35.40" rx="2.62" fill="#FFFFFF"/>
  <text x="458.867" y="475.9" fill="#75BA66" font-size="8" font-weight="bold" font-family="Microsoft YaHei" text-anchor="middle" dominant-baseline="middle">服务成效</text>
  <text x="388.6" y="523.74" font-family="Microsoft YaHei"><tspan fill="#1A1A1A" font-size="0.5" font-weight="normal">完成行业大模型内安全测试，发现模型应用场景存在模型越狱导致敏感信息泄漏、虚假信息、成人问题、暴力、诈骗、政治等内容安全问题，门户系统存在越权等漏洞问题。</tspan></text>
  <text x="1039.4" y="540.46" font-family="Microsoft YaHei"><tspan fill="#1A1A1A" font-size="0.5" font-weight="normal">提供专业的修复建议和加固手段，帮助客户进行大模型应用场景安全加固</tspan><tspan fill="#1A1A1A" font-size="0.5" font-weight="normal">。</tspan></text>
</svg>
