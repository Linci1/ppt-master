<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- ===== L-R SPLIT VARIANT: 左侧双卡片 + 右侧大内容区 ===== -->
  <!-- 背景: #1A1A2E | 强调色: #7BBD4A | 深色卡片: #1E3535 -->

  <!-- 背景 -->
  <rect width="1280" height="720" fill="#1A1A2E"/>

  <!-- 顶部标题栏 -->
  <rect x="34" y="32" width="1094" height="73" fill="#222244"/>
  <text x="50" y="73" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Microsoft YaHei">${title}</text>

  <!-- Logo -->
  <rect x="1128" y="29" width="113" height="31" fill="#333355" rx="4"/>

  <!-- 绿色 section 标签 -->
  <rect x="34" y="97" width="280" height="53" fill="#7BBD4A" rx="6"/>
  <text x="50" y="128" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="Microsoft YaHei">${section_label}</text>

  <!-- 左侧面板 (绿色标签区) -->
  <rect x="34" y="151" width="476" height="516" fill="#1E2E2E"/>

  <!-- 左侧卡片1 -->
  <rect x="42" y="200" width="438" height="184" fill="#1E3535" rx="8"/>
  <rect x="42" y="200" width="6" height="184" fill="#7BBD4A" rx="3"/>
  <text x="60" y="230" fill="#7BBD4A" font-size="13" font-weight="bold" font-family="Microsoft YaHei">${card_1_title}</text>
  <text x="60" y="258" fill="#CCCCCC" font-size="11" font-family="Microsoft YaHei">${card_1_content description...}</text>

  <!-- 左侧卡片2 -->
  <rect x="42" y="431" width="438" height="184" fill="#1E3535" rx="8"/>
  <rect x="42" y="431" width="6" height="184" fill="#7BBD4A" rx="3"/>
  <text x="60" y="461" fill="#7BBD4A" font-size="13" font-weight="bold" font-family="Microsoft YaHei">${card_2_title}</text>
  <text x="60" y="489" fill="#CCCCCC" font-size="11" font-family="Microsoft YaHei">${card_2_content description...}</text>

  <!-- 右侧大内容区 -->
  <rect x="539" y="88" width="699" height="576" fill="#1E3A3A" rx="8"/>
  <text x="560" y="380" fill="#555555" font-size="14" font-family="Microsoft YaHei" text-anchor="middle">[右侧大内容区: 图表/数据/图示]</text>
</svg>