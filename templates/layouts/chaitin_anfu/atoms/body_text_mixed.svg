<svg xmlns="http://www.w3.org/2000/svg" viewBox="32.133 109.867 344.6 144.8">
  <text x="35.133" y="126.747" font-family="Microsoft YaHei"><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">客户首次探索大模型应用场景</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">，</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="bold">对于现有大模型应用场景的安全风险了解不足</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">，</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">且</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="bold">内部安全部门当前尚不具备针对大模型应用的安全测试能力</tspan><tspan fill="#FFFFFF" font-size="0.6" font-weight="normal">。</tspan></text>
</svg>
