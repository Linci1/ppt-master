<svg xmlns="http://www.w3.org/2000/svg" viewBox="951.667 152.8 277.4 288.6">
  <text x="954.667" y="184.06" font-family="Microsoft YaHei"><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">经测试</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">，</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">行业底座模型符合合规要求</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">；</tspan></text>
  <text x="954.667" y="220.798" font-family="Microsoft YaHei"><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">模型应用场景测试共发现</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">高风险问题</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">11</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">个</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">、</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">未发现中低风险问题</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">；</tspan></text>
  <text x="954.667" y="257.536" font-family="Microsoft YaHei"><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">系统渗透测试共发现</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">：</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">高危漏洞</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">1</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">个</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">，</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">中危漏洞</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">4</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">个</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">、</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">低危漏洞</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">1</tspan><tspan fill="FF0000" font-size="0.7" font-weight="normal">个</tspan><tspan fill="#1A1A1A" font-size="0.6" font-weight="normal">。</tspan></text>
</svg>
