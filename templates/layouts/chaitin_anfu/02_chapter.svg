<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Background: dark tech image + heavy overlay -->
  <image href="bg_dark_tech.jpeg" x="-12" y="-2" width="1293" height="727" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1280" height="720" fill="#000000" fill-opacity="0.5"/>

  <!-- Left side: large chapter number -->
  <text x="109" y="350" fill="#FFFFFF" font-family="Arial, DIN Alternate, sans-serif" font-size="126" font-weight="700" fill-opacity="0.9">{{CHAPTER_NUM}}</text>

  <!-- Right side: chapter title -->
  <text x="248" y="310" fill="#FFFFFF" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="700">{{CHAPTER_TITLE}}</text>

  <!-- Optional chapter subtitle -->
  <text x="248" y="365" fill="#CCCCCC" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="20">{{CHAPTER_SUBTITLE}}</text>

  <!-- Green accent line below title -->
  <rect x="248" y="380" width="80" height="4" rx="2" fill="#7BBD4A"/>
</svg>