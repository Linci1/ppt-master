<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- White background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- brand_locked_flex_body: true -->
  <!-- The following elements are brand-locked and MUST be preserved in every content page -->

  <!-- Top green accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="#7BBD4A"/>

  <!-- Page title: top-left, brand green -->
  <text x="34" y="56" fill="#7BBD4A" font-family="Arial, +mn-lt, sans-serif" font-size="28" font-weight="700">{{PAGE_TITLE}}</text>

  <!-- Logo: top-right -->
  <image href="chaitin_logo_dark.png" x="1128" y="29" width="113" height="31" preserveAspectRatio="xMidYMid meet"/>

  <!-- Title underline -->
  <rect x="34" y="72" width="1212" height="1" fill="#E0E0E0"/>

  <!-- body_safe_region: x=34 y=90 w=1212 h=580 -->
  <!-- allowed_native_page_types: all ppt-master native page types -->
  <!-- forbidden_actions: modify brand-locked elements above -->

  <!-- Content Area - Executor renders here -->
  <g id="content-area" data-body-safe-region="34,90,1212,580">
    {{CONTENT_AREA}}
  </g>

  <!-- Bottom green accent line -->
  <rect x="0" y="716" width="1280" height="4" fill="#7BBD4A"/>

  <!-- Page number: bottom-right -->
  <text x="1188" y="700" fill="#A6A6A6" font-family="Arial, DIN Alternate, sans-serif" font-size="12">{{PAGE_NUM}}</text>
</svg>