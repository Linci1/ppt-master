<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-template="chaitin" data-page-family="chapter" data-fixed-skeleton="background,brand,page-number" data-footer-protected-top="620" data-logo-safe-zone="40,625,190,70" data-brand-required="true" data-brand-assets="chaitin_logo.png">
  <defs>
    <linearGradient id="chapterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BFF85" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
  </defs>

  <!-- Background image -->
  <image href="bg_chapter.jpeg" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>

  <!-- Dark overlay -->
  <rect x="0" y="0" width="1280" height="720" fill="#05070A" fill-opacity="0.8"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="url(#chapterGrad)" />

  <!-- Section number -->
  <text x="80" y="320" fill="#6BFF85" font-family="DIN Alternate, Arial, sans-serif" font-size="160" font-weight="700" opacity="0.85">{{CHAPTER_NUM}}</text>

  <!-- Section label -->
  <text x="80" y="400" fill="#A7F35A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" letter-spacing="3">{{CHAPTER_LABEL}}</text>

  <!-- Divider -->
  <rect x="80" y="420" width="100" height="3" rx="1.5" fill="url(#chapterGrad)" />

  <!-- Title -->
  <text x="80" y="500" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-weight="700" font-size="42">{{CHAPTER_TITLE}}</text>

  <!-- Subtitle -->
  <text x="80" y="550" fill="#B4BDC9" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16">{{CHAPTER_SUBTITLE}}</text>

  <g id="template-brand-zone" data-role="brand-zone" data-protected-zone="logo" data-zone-box="40,625,190,70" data-brand-asset="chaitin_logo.png" data-brand-variant="brand-green">
    <!-- Chaitin logo - bottom left -->
    <image href="chaitin_logo.png" x="60" y="640" width="120" height="32" preserveAspectRatio="xMidYMid meet" data-brand-asset="chaitin_logo.png"/>
  </g>

  <!-- Page indicator -->
  <text x="1188" y="686" fill="#7A8596" font-family="DIN Alternate, Arial, sans-serif" font-size="14">{{PAGE_NUM}}</text>
</svg>