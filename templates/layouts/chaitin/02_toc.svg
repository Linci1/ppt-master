<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-template="chaitin" data-page-family="toc" data-fixed-skeleton="toc-grid,footer,logo" data-toc-subtitle-policy="uniform" data-footer-protected-top="580" data-logo-safe-zone="40,575,190,70" data-brand-required="true" data-brand-assets="chaitin_logo.png">
  <defs>
    <linearGradient id="tocGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BFF85" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
  </defs>

  <g id="template-background" data-role="background" data-fixed-skeleton="true">
    <!-- Dark background -->
    <rect x="0" y="0" width="1280" height="720" fill="#05070A"/>

    <!-- Top accent line -->
    <rect x="0" y="0" width="1280" height="4" fill="url(#tocGrad)"/>
  </g>

  <g id="toc-header" data-role="header" data-fixed-skeleton="true" data-header-safe-box="60,60,1160,72">
    <!-- Title area -->
    <text x="60" y="80" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-weight="700" font-size="38">{{TITLE}}</text>
    <rect x="60" y="100" width="60" height="3" rx="1.5" fill="url(#tocGrad)"/>

    <!-- Horizontal divider -->
    <rect x="60" y="130" width="1160" height="1" fill="#213042"/>
  </g>

  <!-- 2x2 Grid Layout -->
  <g id="toc-grid" data-role="toc-grid" data-fixed-skeleton="true">
    <g id="toc-item-01" data-role="toc-item" data-structure="number,title,subtitle" data-number-zone="80,160,70,80" data-text-safe-box="156,236,360,92">
      <rect x="156" y="236" width="360" height="92" fill="none" stroke="none" data-template-guide="toc-text-safe-box"/>
      <text x="80" y="220" fill="#6BFF85" font-family="DIN Alternate, Arial, sans-serif" font-size="72" font-weight="700">01</text>
      <text x="80" y="270" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-weight="600" font-size="24">{{ITEM_01_TITLE}}</text>
      <text x="80" y="305" fill="#7A8596" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14">{{ITEM_01_SUBTITLE}}</text>
    </g>

    <g id="toc-item-02" data-role="toc-item" data-structure="number,title,subtitle" data-number-zone="680,160,70,80" data-text-safe-box="756,236,360,92">
      <rect x="756" y="236" width="360" height="92" fill="none" stroke="none" data-template-guide="toc-text-safe-box"/>
      <text x="680" y="220" fill="#6BFF85" font-family="DIN Alternate, Arial, sans-serif" font-size="72" font-weight="700">02</text>
      <text x="680" y="270" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-weight="600" font-size="24">{{ITEM_02_TITLE}}</text>
      <text x="680" y="305" fill="#7A8596" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14">{{ITEM_02_SUBTITLE}}</text>
    </g>

    <!-- Vertical divider -->
    <rect x="640" y="170" width="1" height="180" fill="#213042"/>

    <g id="toc-item-03" data-role="toc-item" data-structure="number,title,subtitle" data-number-zone="80,370,70,80" data-text-safe-box="156,446,360,92">
      <rect x="156" y="446" width="360" height="92" fill="none" stroke="none" data-template-guide="toc-text-safe-box"/>
      <text x="80" y="430" fill="#6BFF85" font-family="DIN Alternate, Arial, sans-serif" font-size="72" font-weight="700">03</text>
      <text x="80" y="480" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-weight="600" font-size="24">{{ITEM_03_TITLE}}</text>
      <text x="80" y="515" fill="#7A8596" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14">{{ITEM_03_SUBTITLE}}</text>
    </g>

    <g id="toc-item-04" data-role="toc-item" data-structure="number,title,subtitle" data-number-zone="680,370,70,80" data-text-safe-box="756,446,360,92">
      <rect x="756" y="446" width="360" height="92" fill="none" stroke="none" data-template-guide="toc-text-safe-box"/>
      <text x="680" y="430" fill="#6BFF85" font-family="DIN Alternate, Arial, sans-serif" font-size="72" font-weight="700">04</text>
      <text x="680" y="480" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-weight="600" font-size="24">{{ITEM_04_TITLE}}</text>
      <text x="680" y="515" fill="#7A8596" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14">{{ITEM_04_SUBTITLE}}</text>
    </g>

    <!-- Horizontal divider between rows -->
    <rect x="60" y="370" width="1160" height="1" fill="#213042"/>
  </g>

  <g id="template-footer" data-role="footer" data-fixed-skeleton="true" data-footer-safe-box="40,575,1180,125">
    <!-- Bottom accent bar -->
    <rect x="60" y="640" width="200" height="3" rx="1.5" fill="url(#tocGrad)"/>

    <g id="template-brand-zone" data-role="brand-zone" data-protected-zone="logo" data-zone-box="40,575,190,70" data-brand-asset="chaitin_logo.png" data-brand-variant="brand-green">
      <!-- Chaitin logo - bottom left -->
      <image href="chaitin_logo.png" x="60" y="590" width="120" height="32" preserveAspectRatio="xMidYMid meet" data-brand-asset="chaitin_logo.png"/>
    </g>

    <g id="template-page-number-zone" data-role="page-number" data-protected-zone="page-number" data-zone-box="1160,668,60,24">
      <!-- Page number -->
      <text x="1188" y="686" fill="#7A8596" font-family="DIN Alternate, Arial, sans-serif" font-size="14">{{PAGE_NUM}}</text>
    </g>
  </g>
</svg>
