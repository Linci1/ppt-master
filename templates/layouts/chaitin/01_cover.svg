<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-template="chaitin" data-page-family="cover" data-fixed-skeleton="background,brand" data-footer-protected-top="600" data-logo-safe-zone="40,585,190,70" data-brand-required="true" data-brand-assets="chaitin_logo.png">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6BFF85" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
  </defs>

  <!-- Background image -->
  <image href="bg_cover.jpeg" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>

  <!-- Dark overlay for text readability -->
  <rect x="0" y="0" width="1280" height="720" fill="#05070A" fill-opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="720" fill="url(#brandGrad)" />

  <!-- Title -->
  <text fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-weight="700" font-size="52" x="60" y="320">{{TITLE}}</text>
  <text fill="#B4BDC9" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="24" x="60" y="374">{{SUBTITLE}}</text>

  <!-- English subtitle -->
  <text x="60" y="430" fill="#A7F35A" font-family="DIN Alternate, Arial, sans-serif" font-size="16" letter-spacing="2">{{ENGLISH_SUBTITLE}}</text>

  <!-- Bottom divider -->
  <rect x="60" y="480" width="1160" height="1" fill="#213042" />

  <!-- Project info -->
  <text x="60" y="520" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16">{{ORG_INFO}}</text>
  <text x="1110" y="520" fill="#F5F7FA" font-family="DIN Alternate, Arial, sans-serif" font-size="16">{{DATE}}</text>

  <g id="template-brand-zone" data-role="brand-zone" data-protected-zone="logo" data-zone-box="40,585,190,70" data-brand-asset="chaitin_logo.png" data-brand-variant="brand-green">
    <!-- Chaitin logo - bottom left -->
    <image href="chaitin_logo.png" x="60" y="600" width="120" height="32" preserveAspectRatio="xMidYMid meet" data-brand-asset="chaitin_logo.png"/>
  </g>
</svg>