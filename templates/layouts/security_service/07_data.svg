<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" data-template="security_service" data-page-family="data" data-fixed-skeleton="background,header,footer,page-number,brand" data-footer-protected-top="648" data-logo-safe-zone="1038,30,190,56" data-brand-required="true" data-brand-assets="images/logo_green.png,images/logo_bottom_right.png,images/logo_top_right.png">
  <g id="template-background" data-role="background" data-fixed-skeleton="true">
    <image href="images/layout_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="1280" height="6" fill="#0563C1" />
    <rect x="0" y="6" width="8" height="714" fill="#0563C1" />
  </g>
  <g id="template-header" data-role="header" data-fixed-skeleton="true" data-header-safe-box="60,50,1160,60">
    <rect x="60" y="50" width="6" height="44" fill="#ED7D31" />
    <text x="84" y="82" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="28" font-weight="bold" fill="#0563C1">{{PAGE_TITLE}}</text>
    <line x1="60" y1="105" x2="1220" y2="105" stroke="#E7E6E6" stroke-width="1" />
  </g>
  <g id="content-area" data-role="flexible-body" data-layout-modes="proof-headline,kpi-strip,main-proof-canvas,evidence-stack,closure-belt" data-advanced-pattern="evidence_cockpit" data-content-max-bottom="620" data-content-safe-box="60,125,1160,495">
    <rect x="60" y="129" width="184" height="34" fill="#0563C1" fill-opacity="0.10" rx="17" data-slot="proof-guide-band" />
    <text x="152" y="151" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" font-weight="bold" fill="#0563C1">{{PAGE_GUIDE_LABEL}}</text>

    <g id="headline-zone" data-slot="proof-headline" data-structure-role="headline-judgment">
      <rect x="60" y="182" width="710" height="88" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <text x="84" y="210" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#94A3B8" data-slot="proof-context">{{PROOF_CONTEXT}}</text>
      <text x="84" y="236" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="22" font-weight="bold" fill="#0563C1" data-slot="proof-headline-text">{{PROOF_HEADLINE}}</text>
      <rect x="84" y="247" width="140" height="3" fill="#ED7D31" rx="2" />
      <text x="84" y="255" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#7C8AA0" data-slot="proof-subline">{{PROOF_SUBLINE}}</text>
    </g>

    <g id="kpi-zone" data-slot="kpi-strip" data-structure-role="metric-anchor-strip">
      <rect x="790" y="182" width="430" height="88" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <text x="815" y="207" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#94A3B8">指标锚点</text>

      <rect x="815" y="212" width="118" height="42" fill="#0563C1" fill-opacity="0.08" rx="10" />
      <text x="874" y="229" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#0563C1">{{DATA_VALUE_1}}</text>
      <text x="874" y="244" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="10" fill="#7C8AA0">{{DATA_LABEL_1}}</text>

      <rect x="946" y="212" width="118" height="42" fill="#4472C4" fill-opacity="0.08" rx="10" />
      <text x="1005" y="229" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#4472C4">{{DATA_VALUE_2}}</text>
      <text x="1005" y="244" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="10" fill="#7C8AA0">{{DATA_LABEL_2}}</text>

      <rect x="1077" y="212" width="118" height="42" fill="#ED7D31" fill-opacity="0.12" rx="10" />
      <text x="1136" y="229" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ED7D31">{{DATA_VALUE_3}}</text>
      <text x="1136" y="244" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="10" fill="#7C8AA0">{{DATA_LABEL_3}}</text>
    </g>

    <g id="proof-zone" data-slot="core-proof-board" data-structure-role="main-proof-board">
      <rect x="60" y="286" width="730" height="248" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <text x="86" y="319" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="16" font-weight="bold" fill="#5B9BD5">主证明结构图</text>
      <line x1="86" y1="329" x2="760" y2="329" stroke="#D9E2F3" stroke-width="1.5" />

      <rect x="100" y="346" width="122" height="28" fill="#0563C1" fill-opacity="0.10" rx="14" />
      <rect x="365" y="346" width="122" height="28" fill="#4472C4" fill-opacity="0.10" rx="14" />
      <rect x="630" y="346" width="122" height="28" fill="#ED7D31" fill-opacity="0.12" rx="14" />
      <text x="161" y="364" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#0563C1">现象 / 入口</text>
      <text x="426" y="364" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#4472C4">核心证明</text>
      <text x="691" y="364" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#ED7D31">结果 / 影响</text>

      <rect x="100" y="394" width="150" height="84" fill="#0563C1" fill-opacity="0.08" rx="14" data-slot="proof-node-left" />
      <text x="175" y="438" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" font-weight="bold" fill="#0563C1">{{PROOF_NODE_1}}</text>

      <rect x="300" y="382" width="250" height="108" fill="#F7FAFE" stroke="#C8D8EE" stroke-width="1.5" rx="16" data-slot="proof-canvas" />
      <text x="425" y="437" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="15" fill="#7C8AA0">{{PROOF_CANVAS}}</text>

      <rect x="600" y="394" width="150" height="84" fill="#ED7D31" fill-opacity="0.10" rx="14" data-slot="proof-node-right" />
      <text x="675" y="438" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" font-weight="bold" fill="#ED7D31">{{PROOF_NODE_3}}</text>

      <line x1="250" y1="436" x2="300" y2="436" stroke="#9FB7D9" stroke-width="3" stroke-dasharray="9 7" />
      <line x1="550" y1="436" x2="600" y2="436" stroke="#F0B37E" stroke-width="3" stroke-dasharray="9 7" />
      <polygon points="314,436 302,429 302,443" fill="#4472C4" />
      <polygon points="614,436 602,429 602,443" fill="#ED7D31" />

      <rect x="145" y="492" width="170" height="24" fill="#0563C1" fill-opacity="0.08" rx="12" data-slot="proof-relation-1" />
      <rect x="535" y="492" width="170" height="24" fill="#ED7D31" fill-opacity="0.10" rx="12" data-slot="proof-relation-2" />
      <text x="230" y="508" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="11" fill="#0563C1">{{PROOF_RELATION_1}}</text>
      <text x="620" y="508" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="11" fill="#ED7D31">{{PROOF_RELATION_2}}</text>
    </g>

    <g id="evidence-stack-zone" data-slot="proof-evidence-stack" data-structure-role="evidence-stack">
      <rect x="820" y="286" width="400" height="248" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <text x="844" y="319" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="16" font-weight="bold" fill="#0563C1">证据栈 / 判断收束</text>
      <line x1="844" y1="329" x2="1190" y2="329" stroke="#D9E2F3" stroke-width="1.5" />

      <rect x="844" y="346" width="352" height="48" fill="#0563C1" fill-opacity="0.07" rx="12" data-slot="evidence-card-1" />
      <text x="866" y="365" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#0563C1">直接证据</text>
      <text x="866" y="384" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#44546A">{{DATA_NOTE_1}}</text>

      <rect x="844" y="407" width="352" height="48" fill="#4472C4" fill-opacity="0.07" rx="12" data-slot="evidence-card-2" />
      <text x="866" y="426" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#4472C4">结果证据</text>
      <text x="866" y="445" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#44546A">{{DATA_NOTE_2}}</text>

      <rect x="844" y="468" width="352" height="48" fill="#ED7D31" fill-opacity="0.12" rx="12" data-slot="evidence-card-3" />
      <text x="866" y="487" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#C55A11">管理判断</text>
      <text x="866" y="506" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#44546A">{{DATA_NOTE_3}}</text>
    </g>

    <g id="closure-belt-zone" data-slot="proof-closure-belt" data-structure-role="closure-belt">
      <rect x="60" y="552" width="1160" height="58" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <rect x="82" y="566" width="340" height="30" fill="#0563C1" fill-opacity="0.08" rx="15" />
      <rect x="470" y="566" width="340" height="30" fill="#4472C4" fill-opacity="0.08" rx="15" />
      <rect x="858" y="566" width="340" height="30" fill="#ED7D31" fill-opacity="0.12" rx="15" />
      <text x="252" y="585" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#0563C1">{{PROOF_SUMMARY_1}}</text>
      <text x="640" y="585" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#4472C4">{{PROOF_SUMMARY_2}}</text>
      <text x="1028" y="585" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#C55A11">{{PROOF_SUMMARY_3}}</text>
    </g>
  </g>
  <g id="template-brand-zone" data-role="brand-zone" data-protected-zone="logo" data-zone-box="1038,30,190,56" data-brand-asset="images/logo_green.png" data-brand-variant="brand-green-light">
    <image href="images/logo_green.png" x="1046" y="34" width="170" height="46" preserveAspectRatio="xMidYMid meet" data-brand-asset="images/logo_green.png" />
  </g>
  <g id="template-page-number-zone" data-role="page-number" data-protected-zone="page-number" data-zone-box="48,668,96,28">
    <text x="60" y="690" font-family="Arial" font-size="14" fill="#44546A">{{PAGE_NUM}}</text>
  </g>
  <g id="template-footer" data-role="footer" data-fixed-skeleton="true" data-footer-safe-box="0,648,1280,72">
    <rect x="0" y="714" width="1280" height="6" fill="#ED7D31" />
  </g>
</svg>
