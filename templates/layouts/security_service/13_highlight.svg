<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" data-template="security_service" data-page-family="highlight" data-fixed-skeleton="background,header,footer,page-number,brand" data-footer-protected-top="640" data-logo-safe-zone="1038,30,190,56" data-brand-required="true" data-brand-assets="images/logo_green.png,images/logo_bottom_right.png,images/logo_top_right.png">
  <g id="template-background" data-role="background" data-fixed-skeleton="true">
    <image href="images/layout_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="1280" height="6" fill="#0563C1" />
    <rect x="0" y="6" width="8" height="714" fill="#0563C1" />
  </g>
  <g id="template-header" data-role="header" data-fixed-skeleton="true" data-header-safe-box="60,50,1160,60">
    <rect x="60" y="50" width="6" height="44" fill="#ED7D31" />
    <text x="84" y="82" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="28" font-weight="bold" fill="#0563C1">{{PAGE_TITLE}}</text>
    <line x1="60" y1="105" x2="1220" y2="105" stroke="#E7E6E6" stroke-width="1" />
  </g>
  <g id="content-area" data-role="flexible-body" data-layout-modes="hero-metric,side-stats" data-content-max-bottom="586" data-content-safe-box="120,160,1040,430">
    <rect x="120" y="160" width="1040" height="410" fill="#FFFFFF" fill-opacity="0.95" rx="12" />
    <rect x="120" y="160" width="1040" height="12" fill="#0563C1" rx="12" />
    <rect x="260" y="215" width="760" height="160" fill="#0563C1" fill-opacity="0.06" rx="12" />
    <text x="640" y="305" text-anchor="middle" font-family="Arial" font-size="58" font-weight="bold" fill="#0563C1">{{HIGHLIGHT_VALUE}}</text>
    <rect x="430" y="388" width="420" height="42" fill="#ED7D31" fill-opacity="0.12" rx="21" />
    <text x="640" y="415" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="22" fill="#ED7D31">{{HIGHLIGHT_UNIT}}</text>
    <rect x="240" y="448" width="800" height="62" fill="#F9FAFB" rx="10" />
    <text x="640" y="486" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="17" fill="#44546A">{{HIGHLIGHT_DESC}}</text>
    <rect x="180" y="512" width="300" height="68" fill="#0563C1" fill-opacity="0.10" rx="10" />
    <text x="205" y="540" font-family="Arial" font-size="20" font-weight="bold" fill="#0563C1">{{SIDE_STAT_1}}</text>
    <text x="205" y="563" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#44546A">{{SIDE_LABEL_1}}</text>
    <rect x="800" y="512" width="300" height="68" fill="#ED7D31" fill-opacity="0.12" rx="10" />
    <text x="825" y="540" font-family="Arial" font-size="20" font-weight="bold" fill="#ED7D31">{{SIDE_STAT_2}}</text>
    <text x="825" y="563" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" fill="#44546A">{{SIDE_LABEL_2}}</text>
  </g>
  <g id="template-brand-zone" data-role="brand-zone" data-protected-zone="logo" data-zone-box="1038,30,190,56" data-brand-asset="images/logo_green.png" data-brand-variant="brand-green-light">
    <image href="images/logo_green.png" x="1046" y="34" width="170" height="46" preserveAspectRatio="xMidYMid meet" data-brand-asset="images/logo_green.png" />
  </g>
  <g id="template-page-number-zone" data-role="page-number" data-protected-zone="page-number" data-zone-box="48,668,96,28">
    <text x="60" y="690" font-family="Arial" font-size="14" fill="#44546A">{{PAGE_NUM}}</text>
  </g>
  <g id="template-footer" data-role="footer" data-fixed-skeleton="true" data-footer-safe-box="0,640,1280,80">
    <rect x="0" y="714" width="1280" height="6" fill="#ED7D31" />
  </g>
</svg>
