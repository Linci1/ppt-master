<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" data-template="security_service" data-page-family="product" data-fixed-skeleton="background,header,footer,page-number,brand" data-footer-protected-top="650" data-logo-safe-zone="1038,30,190,56" data-brand-required="true" data-brand-assets="images/logo_green.png,images/logo_bottom_right.png,images/logo_top_right.png">
  <g id="template-background" data-role="background" data-fixed-skeleton="true">
    <image href="images/layout_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="1280" height="6" fill="#0563C1" />
    <rect x="0" y="6" width="8" height="714" fill="#0563C1" />
  </g>
  <g id="template-header" data-role="header" data-fixed-skeleton="true" data-header-safe-box="60,50,1160,60">
    <rect x="60" y="50" width="6" height="44" fill="#ED7D31" />
    <text x="84" y="82" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="28" font-weight="bold" fill="#0563C1">
    {{PAGE_TITLE}}
  </text>
    <line x1="60" y1="105" x2="1220" y2="105" stroke="#E7E6E6" stroke-width="1" />
  </g>
  <g id="content-area" data-role="flexible-body" data-layout-modes="attack-tree,layered-nodes,evidence-rail" data-advanced-pattern="attack_tree_architecture" data-content-max-bottom="620" data-content-safe-box="60,125,1160,495">
    <rect x="60" y="129" width="196" height="34" fill="#0563C1" fill-opacity="0.10" rx="17" data-slot="product-guide-band" />
    <text x="158" y="151" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" font-weight="bold" fill="#0563C1">分层攻击树</text>

    <g id="tree-zone" data-slot="attack-tree" data-structure-role="layered-tree">
      <rect x="60" y="182" width="700" height="430" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <text x="86" y="216" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="16" font-weight="bold" fill="#5B9BD5">复杂结构主树</text>
      <line x1="86" y1="226" x2="730" y2="226" stroke="#D9E2F3" stroke-width="1.5" />

      <rect x="272" y="246" width="276" height="56" fill="#0563C1" fill-opacity="0.08" rx="14" />
      <text x="410" y="280" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="18" font-weight="bold" fill="#0563C1">{{PRODUCT_NAME}}</text>
      <rect x="330" y="314" width="160" height="28" fill="#ED7D31" fill-opacity="0.12" rx="14" />
      <text x="410" y="333" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#ED7D31">{{PRODUCT_TAGLINE}}</text>

      <line x1="410" y1="342" x2="410" y2="364" stroke="#9FB7D9" stroke-width="2.5" />
      <line x1="180" y1="390" x2="410" y2="364" stroke="#C8D8EE" stroke-width="2.5" />
      <line x1="410" y1="364" x2="410" y2="390" stroke="#C8D8EE" stroke-width="2.5" />
      <line x1="410" y1="364" x2="640" y2="390" stroke="#C8D8EE" stroke-width="2.5" />

      <rect x="80" y="390" width="200" height="60" fill="#0563C1" fill-opacity="0.08" rx="12" />
      <rect x="300" y="390" width="220" height="60" fill="#4472C4" fill-opacity="0.08" rx="12" />
      <rect x="540" y="390" width="160" height="60" fill="#5B9BD5" fill-opacity="0.10" rx="12" />
      <text x="180" y="425" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#44546A">{{PRODUCT_FEATURE_1}}</text>
      <text x="410" y="425" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#44546A">{{PRODUCT_FEATURE_2}}</text>
      <text x="620" y="425" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#44546A">{{PRODUCT_FEATURE_3}}</text>

      <line x1="180" y1="450" x2="180" y2="478" stroke="#9FB7D9" stroke-width="2" stroke-dasharray="7 6" />
      <line x1="410" y1="450" x2="410" y2="478" stroke="#9FB7D9" stroke-width="2" stroke-dasharray="7 6" />
      <line x1="620" y1="450" x2="620" y2="478" stroke="#9FB7D9" stroke-width="2" stroke-dasharray="7 6" />

      <rect x="80" y="478" width="200" height="74" fill="#ED7D31" fill-opacity="0.10" rx="12" />
      <rect x="300" y="478" width="220" height="74" fill="#70AD47" fill-opacity="0.12" rx="12" />
      <rect x="540" y="478" width="160" height="74" fill="#954F72" fill-opacity="0.10" rx="12" />
      <text x="180" y="520" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#44546A">{{PRODUCT_FEATURE_4}}</text>
      <text x="410" y="520" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#44546A">{{PRODUCT_FEATURE_5}}</text>
      <text x="620" y="520" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#44546A">{{PRODUCT_FEATURE_6}}</text>
    </g>

    <g id="evidence-zone" data-slot="tree-evidence" data-structure-role="evidence-rail">
      <rect x="790" y="182" width="430" height="430" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <text x="814" y="216" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="16" font-weight="bold" fill="#ED7D31">证明截图 / 结论收束</text>
      <line x1="814" y1="226" x2="1190" y2="226" stroke="#F6D3B6" stroke-width="1.5" />
      <rect x="814" y="246" width="382" height="190" fill="#F9FAFB" rx="12" />
      <text x="1005" y="347" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" fill="#CBD5E1">{{PRODUCT_IMAGE}}</text>
      <rect x="814" y="458" width="382" height="114" fill="#0563C1" fill-opacity="0.08" rx="12" />
      <text x="838" y="522" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" fill="#0563C1">{{PRODUCT_VALUE}}</text>
    </g>
  </g>
  <g id="template-brand-zone" data-role="brand-zone" data-protected-zone="logo" data-zone-box="1038,30,190,56" data-brand-asset="images/logo_green.png" data-brand-variant="brand-green-light">
    <image href="images/logo_green.png" x="1046" y="34" width="170" height="46" preserveAspectRatio="xMidYMid meet" data-brand-asset="images/logo_green.png" />
  </g>
  <g id="template-page-number-zone" data-role="page-number" data-protected-zone="page-number" data-zone-box="48,668,96,28">
    <text x="60" y="690" font-family="Arial" font-size="14" fill="#44546A">{{PAGE_NUM}}</text>
  </g>
  <g id="template-footer" data-role="footer" data-fixed-skeleton="true" data-footer-safe-box="0,650,1280,70">
    <rect x="0" y="714" width="1280" height="6" fill="#ED7D31" />
  </g>
</svg>
