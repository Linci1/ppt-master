    <g id="value-zone" data-slot="value-output" data-structure-role="result-rail">
      <rect x="890" y="190" width="330" height="330" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <text x="916" y="224" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="16" font-weight="bold" fill="#ED7D31">结果输出</text>
      <line x1="916" y1="234" x2="1190" y2="234" stroke="#F6D3B6" stroke-width="1.5" />

      <rect x="916" y="254" width="272" height="62" fill="#ED7D31" fill-opacity="0.10" rx="10" data-slot="value-card-1" />
      <text x="938" y="291" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" fill="#ED7D31" data-slot="value-1">{{VALUE_1}}</text>

      <rect x="916" y="332" width="272" height="62" fill="#0563C1" fill-opacity="0.08" rx="10" data-slot="value-card-2" />
      <text x="938" y="369" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" fill="#0563C1" data-slot="value-2">{{VALUE_2}}</text>

      <rect x="916" y="410" width="272" height="62" fill="#5B9BD5" fill-opacity="0.10" rx="10" data-slot="value-card-3" />
      <text x="938" y="447" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" fill="#44546A" data-slot="value-3">{{VALUE_3}}</text>
    </g>

    <g id="driver-zone" data-slot="driver-base" data-structure-role="bottom-driver-strip">
      <rect x="60" y="545" width="1160" height="90" fill="#FFFFFF" fill-opacity="0.92" rx="14" />
      <text x="84" y="578" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="16" font-weight="bold" fill="#0563C1" data-slot="driver-title">{{DRIVER_TITLE}}</text>

      <rect x="84" y="590" width="520" height="28" fill="#0563C1" fill-opacity="0.07" rx="14" data-slot="driver-card-1" />
      <circle cx="100" cy="604" r="5" fill="#0563C1" />
      <text x="116" y="609" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" fill="#44546A" data-slot="driver-point-1">{{DRIVER_POINT_1}}</text>

      <rect x="618" y="590" width="520" height="28" fill="#ED7D31" fill-opacity="0.08" rx="14" data-slot="driver-card-2" />
      <circle cx="634" cy="604" r="5" fill="#ED7D31" />
      <text x="650" y="609" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="14" fill="#44546A" data-slot="driver-point-2">{{DRIVER_POINT_2}}</text>
