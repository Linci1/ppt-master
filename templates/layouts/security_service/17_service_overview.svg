<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" data-template="security_service" data-page-family="service-overview" data-fixed-skeleton="background,header,footer,page-number,brand" data-footer-protected-top="650" data-logo-safe-zone="1038,30,190,56" data-brand-required="true" data-brand-assets="images/logo_green.png,images/logo_bottom_right.png,images/logo_top_right.png">
  <g id="template-background" data-role="background" data-fixed-skeleton="true">
    <image href="images/layout_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="1280" height="6" fill="#0563C1" />
    <rect x="0" y="6" width="8" height="714" fill="#0563C1" />
  </g>
  <g id="template-header" data-role="header" data-fixed-skeleton="true" data-header-safe-box="60,50,1160,60">
    <rect x="60" y="50" width="6" height="44" fill="#ED7D31" />
    <text x="84" y="82" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="28" font-weight="bold" fill="#0563C1">{{PAGE_TITLE}}</text>
    <line x1="60" y1="105" x2="1220" y2="105" stroke="#E7E6E6" stroke-width="1" />
  </g>
  <g id="content-area" data-role="flexible-body" data-layout-modes="layered-system-map,central-engine,domain-stack,outcome-rail,driver-base" data-advanced-pattern="layered_system_map" data-content-max-bottom="638" data-content-safe-box="60,125,1160,510">
    <rect x="60" y="125" width="1160" height="42" fill="#0563C1" fill-opacity="0.08" rx="8" data-slot="overview-lead-band" />
    <text x="84" y="151" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="16" fill="#0563C1" data-slot="overview-lead">{{OVERVIEW_LEAD}}</text>

    <g id="platform-zone" data-slot="platform-core" data-structure-role="central-engine">
      <rect x="60" y="190" width="288" height="330" fill="#FFFFFF" fill-opacity="0.94" rx="14" />
      <rect x="60" y="190" width="288" height="12" fill="#0563C1" rx="14" />
      <text x="84" y="224" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" font-weight="bold" fill="#5B9BD5">中央引擎 / 平台底座</text>
      <text x="84" y="258" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="21" font-weight="bold" fill="#0563C1" data-slot="platform-name">{{PLATFORM_NAME}}</text>
      <text x="84" y="304" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="13" fill="#44546A" data-slot="platform-description">{{PLATFORM_DESC}}</text>
      <rect x="84" y="392" width="112" height="72" fill="#0563C1" fill-opacity="0.08" rx="12" />
      <text x="140" y="421" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#0563C1">统一编排</text>
      <text x="140" y="446" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="11" fill="#44546A">能力调度</text>
      <rect x="208" y="392" width="112" height="72" fill="#ED7D31" fill-opacity="0.10" rx="12" />
      <text x="264" y="421" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="12" font-weight="bold" fill="#ED7D31">持续沉淀</text>
      <text x="264" y="446" text-anchor="middle" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="11" fill="#44546A">经验复用</text>
