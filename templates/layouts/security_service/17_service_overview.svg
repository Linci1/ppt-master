      <text x="428" y="304" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="11" fill="#44546A" data-slot="domain-a-description">{{DOMAIN_ATTACK_DESC}}</text>

      <rect x="404" y="336" width="428" height="74" fill="#4472C4" fill-opacity="0.08" rx="12" data-slot="domain-b-card" />
      <rect x="404" y="336" width="6" height="74" fill="#4472C4" rx="6" />
      <text x="428" y="365" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="15" font-weight="bold" fill="#4472C4" data-slot="domain-b-title">{{DOMAIN_DEFENSE_TITLE}}</text>
      <text x="428" y="392" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="11" fill="#44546A" data-slot="domain-b-description">{{DOMAIN_DEFENSE_DESC}}</text>

      <rect x="404" y="424" width="428" height="74" fill="#ED7D31" fill-opacity="0.10" rx="12" data-slot="domain-c-card" />
      <rect x="404" y="424" width="6" height="74" fill="#ED7D31" rx="6" />
      <text x="428" y="453" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="15" font-weight="bold" fill="#ED7D31" data-slot="domain-c-title">{{DOMAIN_TRAINING_TITLE}}</text>
      <text x="428" y="480" font-family="Microsoft YaHei, 微软雅黑, Arial" font-size="11" fill="#44546A" data-slot="domain-c-description">{{DOMAIN_TRAINING_DESC}}</text>
    </g>

    <g id="connector-zone" data-slot="relationship-connectors" data-structure-role="flow-connector">
