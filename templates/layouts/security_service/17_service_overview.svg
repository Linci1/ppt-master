      <circle cx="363" cy="355" r="6" fill="#0563C1" />
      <line x1="860" y1="355" x2="890" y2="355" stroke="#F0B37E" stroke-width="3" />
      <circle cx="875" cy="355" r="6" fill="#ED7D31" />
